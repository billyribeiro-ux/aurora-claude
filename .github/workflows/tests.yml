name: tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps (torch-free — torch-only tests self-skip)
        run: pip install numpy pandas scikit-learn scipy pytest
      - name: Run test suite
        run: python -m pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: svelte-check (TypeScript strict, 0 errors 0 warnings)
        run: npm run check
